<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=\, initial-scale=1.0">
    <title>Color switch</title>
    <style>
        .d{
            height: 100px;
            width: 100px;
            border: 2px solid black;
            border-radius: 50%;
            
            margin-left: 50px;
            float: left;
        }
        #canvas{
            height: 500px;
            width: 500px;
            border: 2px solid black;
            margin-top: 80px;
        }
    </style>
</head>
<body>
    <marquee behavior="" direction="">
    <div class="d" id="d1" style="background-color: red;">1</div>
    <div class="d" id="d2" style="background-color: yellow;">2</div>
    <div class="d" id="d3" style="background-color: green;">3</div>
    <div class="d" id="d4" style="background-color: blue;">4</div>
    <div class="d" id="d5" style="background-color: peru;">5</div>
    <div class="d" id="d6" style="background-color: purple;">6</div>
    </marquee>

    <center>
        <div id="canvas"></div>
    </center>

    
    
</body>
<script>
    var x=document.querySelectorAll(".d");
    x[0].addEventListener("click",function(){
        document.getElementById("canvas").style.backgroundColor="red";
    })
    x[1].addEventListener("click",function(){
        document.getElementById("canvas").style.backgroundColor="yellow";
    })
    x[2].addEventListener("click",function(){
        document.getElementById("canvas").style.backgroundColor="green";
    })
    x[3].addEventListener("click",function(){
        document.getElementById("canvas").style.backgroundColor="blue";
    })
    x[4].addEventListener("click",function(){
        document.getElementById("canvas").style.backgroundColor="peru";
    })
    x[5].addEventListener("click",function(){
        document.getElementById("canvas").style.backgroundColor="purple";
    })
   
</script>
</html>
